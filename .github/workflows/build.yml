name: Build Windows App

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.19.1' # Node 18.20+ versiyonlarında Windows spawn EINVAL hatası olduğu için eski sürüme sabitliyoruz

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Python 3.12'de distutils kaldırıldığı için eski node-gyp hata veriyor, 3.11 kullanıyoruz.

      - name: Install Dependencies
        run: npm install
        # Not: package.json içindeki "postinstall": "electron-builder install-app-deps"
        # sayesinde better-sqlite3 ve serialport gibi native modüller otomatik olarak
        # Electron için derlenecektir.

      - name: Build Application (Windows 7 Uyumlu - x64 & ia32)
        run: npm run dist

      - name: Auto Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "ETİBOL RESTO v1.0.${{ github.run_number }}"
          files: dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

